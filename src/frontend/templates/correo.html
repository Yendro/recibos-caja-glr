<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
  </head>
  <body
    style="
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      color: #171d1c;
      padding: 20px;
    "
  >
    <div
      style="
        max-width: 600px;
        margin: 0 auto;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        overflow: hidden;
      "
    >
      <div
        style="
          background-color: #fa8072;
          color: #ffffff;
          padding: 20px;
          text-align: center;
        "
      >
        <h2 style="margin: 0">Confirmación de Recibo</h2>
      </div>

      <div style="padding: 30px 20px">
        <p style="font-size: 16px">
          Confirmación de pago de <strong><?= cliente ?></strong>,
        </p>

        <p style="font-size: 15px; color: #838383">
          Adjunto a este correo encontrarás el documento PDF correspondiente al
          recibo con folio <strong><?= folio ?></strong>, debidamente firmado.
        </p>

        <p
          style="
            font-size: 14px;
            margin-top: 40px;
            border-top: 1px solid #eee;
            padding-top: 20px;
            color: #838383;
          "
        >
          Este es un correo generado automáticamente. Por favor, conserve este
          archivo para sus registros.
        </p>
      </div>
    </div>
  </body>
</html>
