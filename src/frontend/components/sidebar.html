<div
  class="offcanvas offcanvas-end shadow-lg"
  tabindex="-1"
  id="offcanvasSidebar"
  aria-labelledby="offcanvasSidebarLabel"
  style="width: 400px; border-left: none"
>
  <div class="offcanvas-header bg-light border-bottom p-4">
    <h5 class="offcanvas-title fw-bold text-dark" id="offcanvasSidebarLabel">
      <i class="fa-solid fa-file-invoice-dollar text-primary-custom me-2"></i>
      Auditoría de Caja
    </h5>
    <button
      type="button"
      class="btn-close"
      data-bs-dismiss="offcanvas"
      aria-label="Close"
    ></button>
  </div>

  <div class="offcanvas-body d-flex flex-column p-4 bg-white">
    <div
      class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2"
    >
      <h6 class="fw-bold text-secondary mb-0">Recibos por Generar</h6>
      <button
        class="btn btn-sm btn-light text-secondary rounded-pill shadow-sm"
        onclick="actualizarListaPendientes()"
        title="Actualizar lista"
      >
        <i class="fa-solid fa-rotate-right"></i>
      </button>
    </div>

    <div
      id="listaPendientesContainer"
      class="mb-4 flex-grow-1 overflow-auto"
      style="max-height: 45vh"
    >
      <div class="text-center text-muted small py-4">
        <i class="fa-solid fa-spinner fa-spin me-1"></i> Sincronizando filas de
        Sheets...
      </div>
    </div>

    <div
      id="generacionAlert"
      class="alert d-none small p-3 shadow-sm text-center mb-3"
      role="alert"
    ></div>

    <button
      id="btnGenerarRecibos"
      class="btn btn-primary-custom btn-lg w-100 shadow-sm fw-bold mb-3"
      onclick="iniciarGeneracion()"
    >
      <i class="fa-solid fa-wand-magic-sparkles me-2"></i> Generar Pendientes
    </button>

    <div class="mt-auto text-center pt-3 border-top">
      <small class="text-muted"
        ><i class="fa-solid fa-shield-halved me-1 text-success"></i> Ejecutado
        bajo credenciales de Admin</small
      >
    </div>
  </div>
</div>
