<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador de recibos</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --naranja: #ff7965;
        --naranja-dark: #ef5d47;
        --naranja-soft: #fff1ee;
        --blanco: #fdfbfc;
        --texto: #2d2d2d;
        --gris: #6f6f6f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: #f4f4f4;
        font-family: "Segoe UI", Arial, sans-serif;
        padding: 14px;
        color: var(--texto);
      }

      .sidebar-card {
        border: none;
        border-radius: 18px;
        overflow: hidden;
        background: #ffffff;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }

      /* HEADER */

      .sidebar-header {
        background: linear-gradient(
          135deg,
          var(--naranja-dark),
          var(--naranja)
        );
        color: white;
        padding: 22px 20px;
      }

      .sidebar-header h3 {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .sidebar-header .subtitle {
        margin-top: 6px;
        font-size: 14px;
        opacity: 0.95;
      }

      /* BOTONES ARRIBA */

      .top-actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 20px;
      }

      .top-actions .btn {
        border-radius: 14px;
        font-weight: 700;
        font-size: 15px;
        padding: 15px 18px;
        border: none;
        transition: 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .top-actions .btn:hover {
        transform: translateY(-1px);
      }

      .btn-primary {
        background: #ffffff;
        color: var(--naranja-dark);
        box-shadow: 0 4px 12px rgba(255, 255, 255, 0.25);
      }

      .btn-primary:hover {
        background: #fff4f1;
        color: var(--naranja-dark);
      }

      .btn-dark {
        background: rgba(0, 0, 0, 0.18);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(5px);
      }

      .btn-dark:hover {
        background: rgba(0, 0, 0, 0.28);
      }

      /* LEYENDA */

      .header-note {
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.25);
        font-size: 13px;
        text-align: center;
        color: rgba(255, 255, 255, 0.95);
      }

      /* CONTENT */

      .content-area {
        padding: 18px;
      }

      .contador {
        color: var(--naranja-dark);
        font-weight: 700;
        font-size: 15px;
        margin-bottom: 14px;
      }

      .pendiente {
        background: var(--naranja-soft);
        border: 2px solid #ffd1ca;
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        color: #7a3b31;
        transition: 0.2s ease;
      }

      .pendiente:hover {
        transform: translateY(-2px);
        background: #ffe7e2;
      }

      .pendiente i {
        font-size: 18px;
        color: var(--naranja-dark);
      }

      .pendiente span {
        line-height: 1.3;
        font-size: 15px;
        font-weight: 500;
        word-break: break-word;
      }

      /* EMPTY STATE */

      .empty-state {
        background: #f4fff8;
        border: 2px solid #b7f0c9;
        color: #1f7a43;
        padding: 14px;
        border-radius: 14px;
        text-align: center;
        font-size: 14px;
        font-weight: 500;
      }

      /* STATUS */

      .loading-text {
        text-align: center;
        padding: 20px 10px;
        color: var(--gris);
        font-size: 14px;
      }

      .alert {
        border-radius: 12px;
        font-size: 14px;
        font-weight: 500;
      }

      /* RESPONSIVE */

      @media (max-width: 480px) {
        .sidebar-header h3 {
          font-size: 21px;
        }

        .top-actions .btn {
          font-size: 14px;
          padding: 14px;
        }
      }
    </style>
  </head>

  <body>
    <div class="card sidebar-card">

      <!-- HEADER -->
      <div class="sidebar-header">
        <h3>
          <i class="fa-solid fa-file-invoice-dollar"></i>
          Recibos Pendientes
        </h3>

        <div class="subtitle">
          Generador automático de recibos
        </div>

        <!-- BOTONES -->
        <div class="top-actions">
          <button id="btnActualizar" type="button" class="btn btn-primary">
            <i class="fa-solid fa-rotate-right"></i>
            Actualizar Lista
          </button>

          <button id="btnGenerar" type="button" class="btn btn-dark">
            <i class="fa-solid fa-file-circle-plus"></i>
            Generar Recibos Pendientes
          </button>
        </div>

        <!-- LEYENDA -->
        <div class="header-note">
          <i class="fa-solid fa-circle-info me-1"></i>
          Verifica la hoja después de generar los recibos.
        </div>
      </div>

      <!-- CONTENIDO -->
      <div class="content-area">

        <div id="listaPendientes" class="loading-text">
          <i class="fa-solid fa-spinner fa-spin me-1"></i>
          Cargando información...
        </div>

        <div id="resultado" class="mt-3"></div>

      </div>
    </div>

    <script>
      function actualizarLista() {
        const contenedor = document.getElementById("listaPendientes");

        contenedor.innerHTML = `
          <div class="loading-text">
            <i class="fa-solid fa-spinner fa-spin me-1"></i>
            Cargando información...
          </div>
        `;

        google.script.run
          .withSuccessHandler(function (pendientes) {

            if (pendientes.length === 0) {

              contenedor.innerHTML = `
                <div class="empty-state">
                  <i class="fa-solid fa-circle-check me-1"></i>
                  No hay recibos pendientes.
                </div>
              `;

            } else {

              let html = `
                <div class="contador">
                  <i class="fa-solid fa-list-check me-1"></i>
                  ${pendientes.length} recibo(s) pendiente(s):
                </div>
              `;

              pendientes.forEach((p) => {
                html += `
                  <div class="pendiente">
                    <i class="fa-regular fa-file-lines"></i>
                    <span>${p.cliente} - ${p.folio}</span>
                  </div>
                `;
              });

              contenedor.innerHTML = html;
            }
          })
          .obtenerEstadoPendientes();
      }

      document
        .getElementById("btnActualizar")
        .addEventListener("click", function () {
          actualizarLista();
        });

      document
        .getElementById("btnGenerar")
        .addEventListener("click", function () {

          const btn = this;
          const resultado = document.getElementById("resultado");

          btn.disabled = true;

          btn.innerHTML = `
            <i class="fa-solid fa-spinner fa-spin"></i>
            Generando...
          `;

          resultado.innerHTML = `
            <div class="alert alert-info mb-0" role="alert">
              <i class="fa-solid fa-clock me-1"></i>
              Procesando recibos pendientes...
            </div>
          `;

          google.script.run
            .withSuccessHandler(function () {

              resultado.innerHTML = `
                <div class="alert alert-success mb-0" role="alert">
                  <i class="fa-solid fa-circle-check me-1"></i>
                  Proceso completado. Revisa la hoja.
                </div>
              `;

              actualizarLista();

              btn.disabled = false;

              btn.innerHTML = `
                <i class="fa-solid fa-file-circle-plus"></i>
                Generar Recibos Pendientes
              `;
            })

            .withFailureHandler(function (error) {

              resultado.innerHTML = `
                <div class="alert alert-danger mb-0" role="alert">
                  <i class="fa-solid fa-triangle-exclamation me-1"></i>
                  Error: ${error.message}
                </div>
              `;

              btn.disabled = false;

              btn.innerHTML = `
                <i class="fa-solid fa-file-circle-plus"></i>
                Generar Recibos Pendientes
              `;
            })

            .generarTodosPendientes();
        });

      actualizarLista();
    </script>
  </body>
</html>
