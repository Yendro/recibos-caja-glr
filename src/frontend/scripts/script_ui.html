<script>
  let modoAdmin = false;
  let recibosSeleccionados = new Set();
  let solicitudesData = [];
  let solicitudesSeleccionadas = new Set();
  let vistaActual = "recibos"; // Memoria para saber en qué pestaña estamos
  let currentTipoCorreo = "recibo";

  function renderizarUI(data) {
    recibosData = data.recibos;
    solicitudesData = data.solicitudes || []; // Precaución por si viene vacío
    listadoCorreos = data.correosPredefinidos;

    // Limpiamos selecciones
    recibosSeleccionados.clear();
    solicitudesSeleccionadas.clear();

    document.getElementById("loadingIndicator").style.display = "none";
    document.getElementById("appTabs").style.display = "flex"; // Mostrar pestañas

    // Actualizar Badge de Solicitudes
    const badge = document.getElementById("badgeSolicitudes");
    if (solicitudesData.length > 0) {
      badge.innerText = solicitudesData.length;
      badge.classList.remove("d-none");
    } else {
      badge.classList.add("d-none");
    }

    actualizarContadorAdmin();
    actualizarContadorSolicitudes();

    renderizarFiltros();
    renderizarTarjetas();
    renderizarTablaSolicitudes();

    // MANTENER LA VISTA AL RECARGAR DATOS
    if (vistaActual === "solicitudes") {
      document.getElementById("solicitudes-tab").click();
    }
  }

  function cambiarVista(vista) {
    vistaActual = vista;
    // Si cambiamos de vista, apagamos el modo admin de recibos por seguridad
    if (modoAdmin && vista === "solicitudes") toggleModoAdmin();
  }

  // LÓGICA DE RECIBOS (Tarjetas)
  function renderizarFiltros() {
    const filterDiv = document.getElementById("filterContainer");
    const hojasUnicas = [...new Set(recibosData.map((r) => r.nombreHoja))];
    if (recibosData.length === 0) {
      filterDiv.innerHTML = "";
      return;
    }
    let html = `<button class="btn btn-sm ${filtroActual === "TODOS" ? "btn-dark" : "btn-outline-secondary"} rounded-pill px-4 fw-bold" onclick="aplicarFiltro('TODOS')">Todos</button>`;
    hojasUnicas.forEach((hoja) => {
      html += `<button class="btn btn-sm ${filtroActual === hoja ? "btn-primary-custom" : "btn-outline-secondary"} rounded-pill px-4 fw-bold shadow-sm" onclick="aplicarFiltro('${hoja}')"><i class="fa-solid fa-folder-open me-1"></i> ${hoja}</button>`;
    });
    filterDiv.innerHTML = html;
  }

  function aplicarFiltro(hoja) {
    filtroActual = hoja;
    renderizarFiltros();
    renderizarTarjetas();
  }

  function renderizarTarjetas() {
    const listDiv = document.getElementById("receiptsList");
    const recibosFiltrados =
      filtroActual === "TODOS"
        ? recibosData
        : recibosData.filter((r) => r.nombreHoja === filtroActual);

    if (recibosFiltrados.length === 0) {
      listDiv.innerHTML = `<div class="col-12"><div class="alert alert-success fw-bold text-center py-4 shadow-sm"><i class="fa-solid fa-check-circle fs-2 mb-2 d-block text-success"></i>¡Al día! No hay recibos pendientes en esta vista.</div></div>`;
      return;
    }

    let html = "";
    recibosFiltrados.forEach((r) => {
      const indexReal = recibosData.indexOf(r);
      const esFirmado = r.estadoFirma === "FIRMADO";
      const fotoCapturada = r.estatusFoto === "CAPTURADA";
      const importeFormateado = Number(r.importe).toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      });

      const isSelected = recibosSeleccionados.has(indexReal);
      const adminBorder =
        modoAdmin && isSelected ? "border-danger border-2" : "";
      const adminBg = modoAdmin && isSelected ? "bg-danger bg-opacity-10" : "";
      const pointer = modoAdmin ? "cursor: pointer; transition: 0.2s;" : "";
      const checkboxHtml = modoAdmin
        ? `<div class="position-absolute top-0 start-0 m-2 mt-3 ms-3"><input type="checkbox" class="form-check-input border-secondary" style="transform: scale(1.5); pointer-events: none;" ${isSelected ? "checked" : ""}></div>`
        : "";

      const btnFotoHtml = fotoCapturada
        ? `<button class="btn btn-dark btn-sm flex-fill disabled"><i class="fa-solid fa-camera"></i> Capturada</button>`
        : `<button class="btn btn-dark btn-sm flex-fill" onclick="abrirModalFoto(${indexReal})"><i class="fa-solid fa-camera"></i> Foto</button>`;
      const btnFirmaHtml = esFirmado
        ? `<button class="btn btn-success btn-sm flex-fill disabled"><i class="fa-solid fa-check-double"></i> Firmado</button>`
        : `<button class="btn btn-primary-custom btn-sm flex-fill" onclick="abrirModalFirma(${indexReal})"><i class="fa-solid fa-pen-nib"></i> Firmar</button>`;
      const btnEnviarHtml = `<button class="btn btn-blue btn-sm flex-fill ${!esFirmado ? "disabled" : ""}" onclick="abrirModalCorreo(${indexReal})"><i class="fa-solid fa-paper-plane"></i> Enviar</button>`;

      html += `
          <div class="col-md-6 col-lg-4" ${modoAdmin ? `onclick="toggleSeleccion(${indexReal})"` : ""} style="${pointer}">
            <div class="card receipt-card p-3 position-relative ${adminBorder} ${adminBg}">
              ${checkboxHtml}
              <span class="badge bg-light text-secondary position-absolute top-0 end-0 m-2 border">Fila ${r.rowIndex}</span>
              <div class="d-flex justify-content-between align-items-start mb-2 ${modoAdmin ? "ms-4" : ""}">
                <div>
                  <h6 class="mb-0 fw-bold" style="color: var(--color-primary)">${r.folio}</h6>
                  <small class="text-muted d-block mt-1"><i class="fa-regular fa-user me-1"></i>${r.cliente}</small>
                  <small class="text-muted d-block mt-1"><i class="fa-solid fa-money-bill-wave me-1"></i>$${importeFormateado}</small>
                </div>
              </div>
              <p class="small mb-3 text-truncate text-secondary"><strong>Concepto:</strong> ${r.concepto}</p>
              
              <div class="d-flex gap-2 mt-2" style="${modoAdmin ? "opacity: 0.4; pointer-events: none;" : ""}">
                ${btnFotoHtml} ${btnFirmaHtml} ${btnEnviarHtml}
              </div>
            </div>
          </div>
        `;
    });
    listDiv.innerHTML = html;
  }

  // MODO ADMIN (RECIBOS)
  function toggleModoAdmin() {
    modoAdmin = !modoAdmin;
    recibosSeleccionados.clear();
    const bar = document.getElementById("adminBottomBar");
    if (modoAdmin) {
      // Forzar el cambio a la vista de recibos
      if (vistaActual !== "recibos")
        document.getElementById("recibos-tab").click();
      bar.classList.remove("d-none");
      setTimeout(() => (bar.style.transform = "translateY(0)"), 10);
    } else {
      bar.style.transform = "translateY(100%)";
      setTimeout(() => bar.classList.add("d-none"), 300);
    }
    actualizarContadorAdmin();
    renderizarTarjetas();
  }

  function toggleSeleccion(index) {
    if (!modoAdmin) return;
    if (recibosSeleccionados.has(index)) recibosSeleccionados.delete(index);
    else recibosSeleccionados.add(index);
    actualizarContadorAdmin();
    renderizarTarjetas();
  }

  function actualizarContadorAdmin() {
    const countEl = document.getElementById("adminCount");
    if (countEl) countEl.innerText = recibosSeleccionados.size;
  }

  function confirmarEliminacion() {
    if (recibosSeleccionados.size === 0)
      return alert("Selecciona al menos un recibo.");
    if (
      !confirm(
        `¿Seguro de eliminar físicamente ${recibosSeleccionados.size} recibos (Documento y Fila)?\n\nEsta acción no se puede deshacer.`,
      )
    )
      return;

    const btn = document.getElementById("btnAdminDelete");
    btn.disabled = true;
    btn.innerHTML =
      '<span class="spinner-border spinner-border-sm"></span> Borrando...';

    const aEliminar = Array.from(recibosSeleccionados).map((idx) => ({
      nombreHoja: recibosData[idx].nombreHoja,
      rowIndex: recibosData[idx].rowIndex,
      urlDoc: recibosData[idx].urlDoc,
    }));

    google.script.run
      .withSuccessHandler((res) => {
        btn.disabled = false;
        btn.innerHTML =
          '<i class="fa-solid fa-trash"></i> Eliminar Físicamente';
        if (res.success) {
          toggleModoAdmin();
          cargarDatos();
        } else alert("Error: " + res.message);
      })
      .withFailureHandler((err) => {
        alert("Error crítico: " + err);
        btn.disabled = false;
        btn.innerHTML =
          '<i class="fa-solid fa-trash"></i> Eliminar Físicamente';
      })
      .eliminarRecibosMasivo(aEliminar);
  }

  // LÓGICA DE SOLICITUDES (TABLA)
  function renderizarTablaSolicitudes() {
    const tbody = document.getElementById("solicitudesList");

    if (solicitudesData.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="text-center py-5 text-muted"><i class="fa-solid fa-inbox fs-2 mb-2 d-block opacity-50"></i>No hay solicitudes pendientes de confirmación.</td></tr>`;
      document.getElementById("chkTodosSol").disabled = true;
      return;
    }

    document.getElementById("chkTodosSol").disabled = false;
    let html = "";

    solicitudesData.forEach((s, i) => {
      // Formato de Fecha
      const fecha = new Date(s.marcaTemporal);
      const fechaFormat = `${fecha.getDate().toString().padStart(2, "0")}/${(fecha.getMonth() + 1).toString().padStart(2, "0")} ${fecha.getHours().toString().padStart(2, "0")}:${fecha.getMinutes().toString().padStart(2, "0")}`;

      const isSelected = solicitudesSeleccionadas.has(i);
      const importeFormat = Number(s.importe).toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      });

      // Estatus
      const badgeCaja =
        s.estadoConfirmacion === "PENDIENTE"
          ? `<span class="badge bg-warning text-dark"><i class="fa-regular fa-clock"></i> Pendiente</span>`
          : `<span class="badge bg-success"><i class="fa-solid fa-check"></i> Confirmado</span>`;

      // Botón Enviar (Deshabilitado si Caja no ha confirmado)
      const btnEnviar =
        s.estadoConfirmacion !== "CONFIRMADO"
          ? `<button class="btn btn-sm btn-outline-secondary disabled border-0" title="Requiere confirmación de Caja"><i class="fa-solid fa-paper-plane"></i></button>`
          : `<button class="btn btn-sm btn-blue shadow-sm" onclick="abrirModalCorreoSolicitud(${i})" title="Enviar Correo al Cliente"><i class="fa-solid fa-paper-plane"></i></button>`;

      html += `
        <tr class="${isSelected ? "table-primary" : ""}">
          <td class="text-center">
            <input class="form-check-input border-secondary chk-solicitud" type="checkbox" ${isSelected ? "checked" : ""} onclick="toggleSolicitudIndividual(${i})">
          </td>
          <td class="small text-muted fw-bold">${fechaFormat}</td>
          <td>
            <div class="fw-bold" style="color: var(--color-primary); font-size: 0.95rem;">${s.cliente}</div>
            <div class="small text-muted">${s.correoSolicitante}</div>
          </td>
          <td class="small text-secondary">${s.concepto}</td>
          <td class="fw-bold text-success">$${importeFormat}</td>
          <td class="text-center">${badgeCaja}</td>
          <td class="text-center">${btnEnviar}</td>
        </tr>
      `;
    });

    tbody.innerHTML = html;
  }

  function toggleSolicitudIndividual(index) {
    if (solicitudesSeleccionadas.has(index))
      solicitudesSeleccionadas.delete(index);
    else solicitudesSeleccionadas.add(index);

    actualizarContadorSolicitudes();
    renderizarTablaSolicitudes();
  }

  function toggleTodasSolicitudes(checkboxMaster) {
    solicitudesSeleccionadas.clear();
    if (checkboxMaster.checked) {
      solicitudesData.forEach((_, i) => solicitudesSeleccionadas.add(i));
    }
    actualizarContadorSolicitudes();
    renderizarTablaSolicitudes();
  }

  function actualizarContadorSolicitudes() {
    const btn = document.getElementById("btnConfirmarMultiples");
    const count = document.getElementById("countSolicitudes");

    count.innerText = solicitudesSeleccionadas.size;
    btn.disabled = solicitudesSeleccionadas.size === 0;

    // Sincronizar el checkbox master visualmente
    const chkMaster = document.getElementById("chkTodosSol");
    if (solicitudesData.length > 0) {
      chkMaster.checked =
        solicitudesSeleccionadas.size === solicitudesData.length;
      chkMaster.indeterminate =
        solicitudesSeleccionadas.size > 0 &&
        solicitudesSeleccionadas.size < solicitudesData.length;
    }
  }

  function confirmarSolicitudes() {
    if (solicitudesSeleccionadas.size === 0) return;

    const btn = document.getElementById("btnConfirmarMultiples");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Confirmando...';

    // Extraer los rowIndex de las solicitudes que palomeaste
    const filasAConfirmar = Array.from(solicitudesSeleccionadas).map(idx => solicitudesData[idx].rowIndex);

    google.script.run
      .withSuccessHandler((res) => {
        if (res.success) {
          cargarDatos(); // Al recargar, la variable vistaActual te mantendrá en la tabla
        } else {
          alert("Error al confirmar: " + res.message);
          btn.disabled = false;
          btn.innerHTML = '<i class="fa-solid fa-check-double me-1"></i> Confirmar en Caja';
        }
      })
      .withFailureHandler((err) => {
        alert("Error crítico: " + err);
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-check-double me-1"></i> Confirmar en Caja';
      })
      .confirmarSolicitudesMasivo(filasAConfirmar);
  }

  function abrirModalCorreoSolicitud(index) {
    currentTipoCorreo = "solicitud"; // Le decimos al modal que operará en modo "Solicitud"
    currentRowIndex = solicitudesData[index].rowIndex;
    
    document.getElementById("correoAlert").classList.add("d-none");

    document.querySelector("#modalCorreo .modal-title").innerHTML = `<i class="fa-solid fa-bell me-2" style="color: var(--color-btn-blue)"></i>Notificar a Cliente`;

    const container = document.getElementById("emailCheckboxesContainer");
    const correoSolicitante = solicitudesData[index].correoSolicitante;
    
    // Tarjeta principal: El correo que el cliente puso en el formulario
    let html = `
      <div class="col-12 col-md-6">
        <label class="d-flex align-items-center gap-3 p-3 shadow-sm h-100 checkbox-card" style="cursor: pointer; border-radius: 8px; border: 1px solid #e2e8f0; background: var(--color-widget); transition: all 0.2s ease;">
          <input class="form-check-input flex-shrink-0 m-0" type="checkbox" value="${correoSolicitante}" checked style="font-size: 1.4em; cursor: pointer;">
          <span class="fw-bold text-secondary text-break w-100" style="font-size: 0.9em; line-height: 1.3;">
            Correo Solicitante <br>
            <small class="fw-normal text-muted">${correoSolicitante}</small>
          </span>
        </label>
      </div>
    `;

    // Tarjetas secundarias
    listadoCorreos.forEach((contacto, i) => {
      html += `
        <div class="col-12 col-md-6">
          <label class="d-flex align-items-center gap-3 p-3 shadow-sm h-100 checkbox-card" style="cursor: pointer; border-radius: 8px; border: 1px solid #e2e8f0; background: var(--color-widget); transition: all 0.2s ease;">
            <input class="form-check-input flex-shrink-0 m-0" type="checkbox" value="${contacto.correo}" style="font-size: 1.4em; cursor: pointer;">
            <span class="fw-bold text-secondary text-break w-100" style="font-size: 0.9em; line-height: 1.3;">
              ${contacto.nombre} <br>
              <small class="fw-normal text-muted">${contacto.correo}</small>
            </span>
          </label>
        </div>
      `;
    });

    container.innerHTML = html;
    new bootstrap.Modal(document.getElementById("modalCorreo")).show();
  }
</script>
</script>
