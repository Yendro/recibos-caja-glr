<script>
  // Escuchar cuando el Offcanvas termina de abrirse para actualizar la lista automáticamente
  document.addEventListener("DOMContentLoaded", () => {
    const sidebarEl = document.getElementById("offcanvasSidebar");
    if (sidebarEl) {
      sidebarEl.addEventListener("shown.bs.offcanvas", () => {
        actualizarListaPendientes();
      });
    }
  });

  function actualizarListaPendientes() {
    const contenedor = document.getElementById("listaPendientesContainer");
    contenedor.innerHTML =
      '<div class="text-center text-muted small py-4"><i class="fa-solid fa-spinner fa-spin me-1"></i> Consultando hojas...</div>';

    google.script.run
      .withSuccessHandler(function (pendientes) {
        if (!pendientes || pendientes.length === 0) {
          contenedor.innerHTML = `
            <div class="alert alert-success text-center small fw-bold mb-0 shadow-sm mt-2" style="background-color: #f4fff8; border-color: #b7f0c9; color: #1f7a43;">
              <i class="fa-solid fa-circle-check fs-4 d-block mb-2 mt-1"></i>
              No hay recibos pendientes en la cola.
            </div>`;
        } else {
          // Etiqueta contadora superior
          let html = `<div class="badge mb-3 w-100 text-start px-3 py-2 shadow-sm" style="background-color: var(--color-primary); font-size: 0.85rem;">
                        <i class="fa-solid fa-list-check me-1"></i> ${pendientes.length} recibo(s) en cola de espera
                      </div>`;

          // Pintar cada fila pendiente
          pendientes.forEach((p) => {
            html += `
              <div class="p-3 mb-2 border rounded d-flex align-items-center gap-3 shadow-sm" style="background-color: #fff1ee; border-color: #ffd1ca !important; transition: 0.2s ease;">
                <i class="fa-regular fa-file-lines fs-5" style="color: var(--color-primary)"></i>
                <div class="lh-sm overflow-hidden">
                  <span class="fw-bold text-dark text-truncate d-block" style="font-size: 0.9rem;">${p.cliente}</span>
                  <span class="text-muted small">${p.folio || "Sin folio asignado"}</span>
                </div>
              </div>
            `;
          });
          contenedor.innerHTML = html;
        }
      })
      .withFailureHandler(function (err) {
        contenedor.innerHTML = `<div class="alert alert-danger text-center small">Error de conexión: ${err}</div>`;
      })
      .obtenerEstadoPendientes();
  }

  function iniciarGeneracion() {
    const btn = document.getElementById("btnGenerarRecibos");
    const alertDiv = document.getElementById("generacionAlert");

    // Bloquear UI y mostrar spinner
    btn.disabled = true;
    btn.innerHTML =
      '<span class="spinner-border spinner-border-sm me-2"></span> Ejecutando Auditoría...';
    alertDiv.classList.add("d-none");

    google.script.run
      .withSuccessHandler((res) => {
        btn.disabled = false;
        btn.innerHTML =
          '<i class="fa-solid fa-wand-magic-sparkles me-2"></i> Generar Pendientes';

        // 1. Manejar caso de error o bloqueo de concurrencia
        if (res && res.length > 0 && res[0].success === false) {
          mostrarAlertaSidebar(res[0].error, "danger");
          return;
        }

        // 2. Si el backend mandó una advertencia de tope de 15 recibos:
        if (res && res.length > 0 && res[0].warning) {
          mostrarAlertaSidebar(
            `<i class="fa-solid fa-triangle-exclamation fs-5 d-block mb-1"></i> ${res[0].warning}`,
            "warning",
          );
        } else {
          // 3. Si todo fluyó normal y eran menos de 15:
          mostrarAlertaSidebar(
            `<i class="fa-solid fa-circle-check fs-5 d-block mb-1"></i> Generación masiva finalizada exitosamente.`,
            "success",
          );
        }

        // Actualizamos ambas vistas
        actualizarListaPendientes();
        cargarDatos();
      })
      .withFailureHandler((err) => {
        btn.disabled = false;
        btn.innerHTML =
          '<i class="fa-solid fa-wand-magic-sparkles me-2"></i> Generar Pendientes';
        mostrarAlertaSidebar(
          `<i class="fa-solid fa-triangle-exclamation me-1"></i> Error Crítico: ${err}`,
          "danger",
        );
      })
      .generarTodosPendientes();
  }

  function mostrarAlertaSidebar(html, tipo) {
    const alertDiv = document.getElementById("generacionAlert");
    alertDiv.className = `alert alert-${tipo} small p-3 shadow-sm text-center mb-3`;
    alertDiv.innerHTML = html;
    alertDiv.classList.remove("d-none");
  }
</script>
