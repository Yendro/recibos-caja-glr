<script>
  let recibosData = [];
  let listadoCorreos = [];
  let currentRowIndex = null;
  let currentNombreHoja = null; // Hoja de la cual proviene información
  let signaturePad;
  let videoStream;
  let fotoBase64 = null;
  let filtroActual = "TODOS"; // Variable global para saber qué estamos viendo

  document.addEventListener("DOMContentLoaded", () => {
    cargarDatos();

    const canvas = document.getElementById("signature-pad");
    signaturePad = new SignaturePad(canvas, {
      backgroundColor: "#fff",
      penColor: "#000",
    });

    // Este evento se dispara EXACTAMENTE cuando el modal termina de abrirse
    const modalFirmaEl = document.getElementById("modalFirma");
    modalFirmaEl.addEventListener("shown.bs.modal", () => {
      resizeCanvas(canvas);
      signaturePad.clear();
      iniciarCamara(); // Definido en modals
    });

    window.addEventListener("resize", () => {
      if (document.getElementById("modalFirma").classList.contains("show")) {
        resizeCanvas(canvas);
      }
    });
  });

  function resizeCanvas(canvas) {
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    // Evitar distorsiones reseteando el ancho nativo primero
    canvas.width = canvas.offsetWidth * ratio;
    canvas.height = canvas.offsetHeight * ratio;
    canvas.getContext("2d").scale(ratio, ratio);
  }

  // === 1. CARGA DE DATOS ===
  function cargarDatos() {
    document.getElementById("loadingIndicator").style.display = "block";
    document.getElementById("receiptsList").innerHTML = "";

    google.script.run
      .withSuccessHandler(renderizarUI) // Definido en UI
      .withFailureHandler((err) => {
        alert("Error cargando datos: " + err);
        document.getElementById("loadingIndicator").style.display = "none";
      })
      .obtenerDatosParaWeb();
  }
</script>
