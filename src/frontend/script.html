<script>
  let recibosData = [];
  let listadoCorreos = [];
  let currentRowIndex = null;
  let currentNombreHoja = null; // Hoja de la cual proviene información
  let signaturePad;
  let videoStream;
  let fotoBase64 = null;

  document.addEventListener("DOMContentLoaded", () => {
    cargarDatos();

    const canvas = document.getElementById("signature-pad");
    signaturePad = new SignaturePad(canvas, {
      backgroundColor: "#fff",
      penColor: "#000",
    });

    // Este evento se dispara EXACTAMENTE cuando el modal termina de abrirse
    const modalFirmaEl = document.getElementById("modalFirma");
    modalFirmaEl.addEventListener("shown.bs.modal", () => {
      resizeCanvas(canvas);
      signaturePad.clear();
      iniciarCamara();
    });

    window.addEventListener("resize", () => {
      if (document.getElementById("modalFirma").classList.contains("show")) {
        resizeCanvas(canvas);
      }
    });
  });

  function resizeCanvas(canvas) {
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    // Evitar distorsiones reseteando el ancho nativo primero
    canvas.width = canvas.offsetWidth * ratio;
    canvas.height = canvas.offsetHeight * ratio;
    canvas.getContext("2d").scale(ratio, ratio);
  }

  // === 1. CARGA DE DATOS ===
  function cargarDatos() {
    document.getElementById("loadingIndicator").style.display = "block";
    document.getElementById("receiptsList").innerHTML = "";

    google.script.run
      .withSuccessHandler(renderizarUI)
      .withFailureHandler((err) => {
        alert("Error cargando datos: " + err);
        document.getElementById("loadingIndicator").style.display = "none";
      })
      .obtenerDatosParaWeb();
  }

  let filtroActual = "TODOS"; // Variable global para saber qué estamos viendo

  function renderizarUI(data) {
    recibosData = data.recibos;
    listadoCorreos = data.correosPredefinidos;

    document.getElementById("loadingIndicator").style.display = "none";

    renderizarFiltros();
    renderizarTarjetas();
  }

  function renderizarFiltros() {
    const filterDiv = document.getElementById("filterContainer");
    const hojasUnicas = [...new Set(recibosData.map((r) => r.nombreHoja))];

    // Si no hay recibos, no mostramos filtros
    if (recibosData.length === 0) {
      filterDiv.innerHTML = "";
      return;
    }

    // Botón "Todos"
    let html = `<button class="btn btn-sm ${filtroActual === "TODOS" ? "btn-dark" : "btn-outline-secondary"} rounded-pill px-4 fw-bold" onclick="aplicarFiltro('TODOS')">Todos</button>`;

    // Botón por cada marca/hoja
    hojasUnicas.forEach((hoja) => {
      html += `<button class="btn btn-sm ${filtroActual === hoja ? "btn-primary-custom" : "btn-outline-secondary"} rounded-pill px-4 fw-bold shadow-sm" onclick="aplicarFiltro('${hoja}')"><i class="fa-solid fa-folder-open me-1"></i> ${hoja}</button>`;
    });

    filterDiv.innerHTML = html;
  }

  function aplicarFiltro(hoja) {
    filtroActual = hoja;
    renderizarFiltros(); // Re-dibujar botones para cambiar colores
    renderizarTarjetas(); // Re-dibujar tarjetas
  }

  function renderizarTarjetas() {
    const listDiv = document.getElementById("receiptsList");

    // Filtramos la data real basándonos en el botón seleccionado
    const recibosFiltrados =
      filtroActual === "TODOS"
        ? recibosData
        : recibosData.filter((r) => r.nombreHoja === filtroActual);

    if (recibosFiltrados.length === 0) {
      listDiv.innerHTML = `<div class="col-12"><div class="alert alert-success fw-bold text-center py-4"><i class="fa-solid fa-check-circle fs-2 mb-2 d-block text-success"></i>¡Al día! No hay recibos pendientes en esta vista.</div></div>`;
      return;
    }

    let html = "";
    recibosFiltrados.forEach((r) => {
      const indexReal = recibosData.indexOf(r); // Necesitamos el índice original para los modales

      const esFirmado = r.estadoFirma === "FIRMADO";
      const fotoCapturada = r.estatusFoto === "CAPTURADA";
      const importeFormateado = Number(r.importe).toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      });

      const btnFotoHtml = fotoCapturada
        ? `<button class="btn btn-dark btn-sm flex-fill disabled" title="Foto ya capturada"><i class="fa-solid fa-camera"></i> Capturada</button>`
        : `<button class="btn btn-dark btn-sm flex-fill" onclick="abrirModalFoto(${indexReal})"><i class="fa-solid fa-camera"></i> Foto</button>`;

      const btnFirmaHtml = esFirmado
        ? `<button class="btn btn-success btn-sm flex-fill disabled"><i class="fa-solid fa-check-double"></i> Firmado</button>`
        : `<button class="btn btn-primary-custom btn-sm flex-fill" onclick="abrirModalFirma(${indexReal})"><i class="fa-solid fa-pen-nib"></i> Firmar</button>`;

      const btnEnviarHtml = `<button class="btn btn-blue btn-sm flex-fill ${!esFirmado ? "disabled" : ""}" onclick="abrirModalCorreo(${indexReal})" ${!esFirmado ? 'title="Debe firmarse primero"' : ""}><i class="fa-solid fa-paper-plane"></i> Enviar</button>`;

      html += `
          <div class="col-md-6 col-lg-4">
            <div class="card receipt-card p-3 position-relative">
              <span class="badge bg-light text-secondary position-absolute top-0 end-0 m-2 border">Fila ${r.rowIndex}</span>
              <div class="d-flex justify-content-between align-items-start mb-2">
                <div>
                  <h6 class="mb-0 fw-bold" style="color: var(--color-primary)">${r.folio}</h6>
                  <small class="text-muted d-block mt-1"><i class="fa-regular fa-user me-1"></i>${r.cliente}</small>
                  <small class="text-muted d-block mt-1"><i class="fa-solid fa-money-bill-wave me-1"></i>$${importeFormateado}</small>
                </div>
              </div>
              <p class="small mb-3 text-truncate text-secondary"><strong>Concepto:</strong> ${r.concepto}</p>

              <div class="d-flex gap-2 mt-2">
                ${btnFotoHtml}
                ${btnFirmaHtml}
                ${btnEnviarHtml}
              </div>
            </div>
          </div>
        `;
    });
    listDiv.innerHTML = html;
  }

  // === 2. LÓGICA FIRMA Y FOTO ===

  // -- A. Lógica Exclusiva de Foto --
  function abrirModalFoto(index) {
    currentRowIndex = recibosData[index].rowIndex;
    currentNombreHoja = recibosData[index].nombreHoja;
    document.getElementById("fotoAlert").innerText = "";
    document.getElementById("btnSaveFoto").disabled = true;
    reiniciarCamaraUI();
    new bootstrap.Modal(document.getElementById("modalFoto")).show();
  }

  function procesarArchivoCamara(event) {
    const file = event.target.files[0];
    if (!file) return;

    document.getElementById("fotoAlert").innerText = "";
    const reader = new FileReader();
    reader.onload = function (e) {
      const img = new Image();
      img.onload = function () {
        const canvas = document.createElement("canvas");
        const MAX_WIDTH = 1000;
        let width = img.width,
          height = img.height;
        if (width > MAX_WIDTH) {
          height = Math.round((height * MAX_WIDTH) / width);
          width = MAX_WIDTH;
        }
        canvas.width = width;
        canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);

        fotoBase64 = canvas.toDataURL("image/jpeg", 0.7);

        document.getElementById("photo-preview").src = fotoBase64;
        document.getElementById("photo-preview").style.display = "block";
        document.getElementById("btnCapture").style.display = "none";
        document.getElementById("btnRetake").style.display = "block";

        // Habilitar botón de guardado
        document.getElementById("btnSaveFoto").disabled = false;
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function reiniciarCamaraUI() {
    document.getElementById("photo-preview").style.display = "none";
    document.getElementById("btnCapture").style.display = "block";
    document.getElementById("btnRetake").style.display = "none";
    document.getElementById("camera-input").value = "";
    document.getElementById("btnSaveFoto").disabled = true;
    fotoBase64 = null;
  }

  function guardarFoto() {
    if (!fotoBase64) return;
    const btnSave = document.getElementById("btnSaveFoto");
    btnSave.disabled = true;
    btnSave.innerHTML =
      '<span class="spinner-border spinner-border-sm"></span> Guardando...';

    google.script.run
      .withSuccessHandler((res) => {
        if (res.success) {
          bootstrap.Modal.getInstance(
            document.getElementById("modalFoto"),
          ).hide();
          cargarDatos();
        } else {
          document.getElementById("fotoAlert").innerText =
            "Error: " + res.message;
        }
        btnSave.disabled = false;
        btnSave.innerHTML =
          '<i class="fa-solid fa-cloud-arrow-up"></i> Guardar Foto';
      })
      .guardarFotoIdentificacion(
        fotoBase64,
        currentRowIndex,
        currentNombreHoja,
      );
  }

  // -- B. Lógica Exclusiva de Firma --
  function abrirModalFirma(index) {
    currentRowIndex = recibosData[index].rowIndex;
    currentNombreHoja = recibosData[index].nombreHoja;
    document.getElementById("docIframe").src = recibosData[
      index
    ].urlDoc.replace(/\/edit.*$/, "/preview?rm=minimal");
    document.getElementById("firmaAlert").innerText = "";

    new bootstrap.Modal(document.getElementById("modalFirma")).show();
  }

  function iniciarGuardadoFirma() {
    if (signaturePad.isEmpty()) {
      document.getElementById("firmaAlert").innerText =
        "⚠️ La firma es obligatoria.";
      return;
    }
    document.getElementById("firmaAlert").innerText = "";
    // Abrir Modal de Confirmación
    new bootstrap.Modal(
      document.getElementById("modalConfirmacionFirma"),
    ).show();
  }

  function guardarProcesoCompleto() {
    const btnSave = document.getElementById("btnSaveProcess");
    const btnMainSave = document.getElementById("btnInitiateSave");
    btnSave.disabled = true;
    btnMainSave.disabled = true;
    btnSave.innerHTML =
      '<span class="spinner-border spinner-border-sm"></span>...';

    const firmaDataURL = signaturePad.toDataURL("image/png");

    google.script.run
      .withSuccessHandler((res) => {
        if (res.success) {
          document.getElementById("docIframe").src = "";
          bootstrap.Modal.getInstance(
            document.getElementById("modalConfirmacionFirma"),
          ).hide();
          bootstrap.Modal.getInstance(
            document.getElementById("modalFirma"),
          ).hide();
          cargarDatos();
        } else {
          bootstrap.Modal.getInstance(
            document.getElementById("modalConfirmacionFirma"),
          ).hide();
          document.getElementById("firmaAlert").innerText =
            "Error: " + res.message;
        }
        btnSave.disabled = false;
        btnMainSave.disabled = false;
        btnSave.innerHTML = "Sí, Guardar";
      })
      .withFailureHandler((err) => {
        bootstrap.Modal.getInstance(
          document.getElementById("modalConfirmacionFirma"),
        ).hide();
        document.getElementById("firmaAlert").innerText = "Error: " + err;
        btnSave.disabled = false;
        btnMainSave.disabled = false;
        btnSave.innerHTML = "Sí, Guardar";
      })
      .procesarYGuardarFirmaWebApp(
        firmaDataURL,
        currentRowIndex,
        currentNombreHoja,
      );
  }

  // === 3. LÓGICA DE CORREO MULTISELECTOR ===

  function mostrarAlertaCorreo(mensaje, tipo) {
    const alertDiv = document.getElementById("correoAlert");
    alertDiv.className = `alert alert-${tipo} small p-2 mt-2`;
    alertDiv.innerText = mensaje;
    alertDiv.classList.remove("d-none");
  }

  function abrirModalCorreo(index) {
    currentRowIndex = recibosData[index].rowIndex;
    currentNombreHoja = recibosData[index].nombreHoja;
    document.getElementById("correoAlert").classList.add("d-none");

    // Construir la tabla de los correos
    const container = document.getElementById("emailCheckboxesContainer");
    let html = "";

    listadoCorreos.forEach((contacto, i) => {
      // Usamos col-12 para celulares (1 columna) y col-md-6 para tablets/PCs (2 columnas)
      // Agregamos h-100 para que todas las tarjetas tengan la misma altura
      html += `
        <div class="col-12 col-md-6">
          <label class="d-flex align-items-center gap-3 p-3 shadow-sm h-100 checkbox-card" style="cursor: pointer; border-radius: 8px; border: 1px solid #e2e8f0; background: var(--color-widget); transition: all 0.2s ease;">
            <input class="form-check-input flex-shrink-0 m-0" type="checkbox" value="${contacto.correo}" id="chkEmail_${i}" style="font-size: 1.4em; cursor: pointer;">
            <span class="fw-bold text-secondary text-break w-100" style="font-size: 0.9em; line-height: 1.3;">
              ${contacto.nombre} <br>
              <small class="fw-normal text-muted">${contacto.correo}</small>
            </span>
          </label>
        </div>
      `;
    });

    container.innerHTML = html;

    new bootstrap.Modal(document.getElementById("modalCorreo")).show();
  }

  function procesarEnvioCorreo() {
    // 1. Recolectar correos seleccionados
    const checkboxes = document.querySelectorAll(
      "#emailCheckboxesContainer .form-check-input:checked",
    );
    const seleccionados = Array.from(checkboxes).map((chk) => chk.value);

    // 2. Validar que al menos uno esté seleccionado
    if (seleccionados.length === 0) {
      mostrarAlertaCorreo("Selecciona al menos un destinatario.", "warning");
      return;
    }

    // 3. Bloquear el botón y mostrar animación
    const btnSend = document.getElementById("btnSendEmail");
    btnSend.disabled = true;
    btnSend.innerHTML =
      '<span class="spinner-border spinner-border-sm"></span> Enviando...';
    document.getElementById("correoAlert").classList.add("d-none");

    // 4. Enviar al Backend
    google.script.run
      .withSuccessHandler((res) => {
        if (res.success) {
          bootstrap.Modal.getInstance(
            document.getElementById("modalCorreo"),
          ).hide();
          cargarDatos(); // Recargar datos para limpiar la pantalla
        } else {
          mostrarAlertaCorreo("Error: " + res.message, "danger");
        }
        btnSend.disabled = false;
        btnSend.innerHTML =
          '<i class="fa-solid fa-paper-plane"></i> Enviar Ahora';
      })
      .withFailureHandler((err) => {
        mostrarAlertaCorreo("Error crítico del servidor: " + err, "danger");
        btnSend.disabled = false;
        btnSend.innerHTML =
          '<i class="fa-solid fa-paper-plane"></i> Enviar Ahora';
      })
      .enviarReciboPorCorreo(currentRowIndex, currentNombreHoja, seleccionados);
  }
</script>
